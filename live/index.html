    <script>
        // Define your password (change it to something secure)
        const adminPassword = "niko1234";
    
        // Load comments from localStorage when the page loads
        document.addEventListener("DOMContentLoaded", function () {
            const savedComments = JSON.parse(localStorage.getItem("comments")) || [];
            const commentContainer = document.getElementById("comment-container");
    
            // Function to create comment element
            function createCommentElement(comment) {
                const commentElement = document.createElement("p");
                commentElement.innerText = comment;
                return commentElement;
            }
    
            // Display each saved comment
            savedComments.forEach(comment => {
                const commentElement = createCommentElement(comment);
                commentContainer.appendChild(commentElement);
            });
    
            // Event listener for posting a new comment
            document.getElementById("btn-post").addEventListener("click", function () {
                const newComment = document.getElementById("new-comment").value;
    
                if (newComment.trim()) {
                    const commentElement = createCommentElement(newComment);
                    commentContainer.appendChild(commentElement); // New comment appears immediately
    
                    // Save the comment to localStorage
                    savedComments.push(newComment);
                    localStorage.setItem("comments", JSON.stringify(savedComments));
    
                    // Clear the textarea
                    document.getElementById("new-comment").value = "";
                }
            });
    
            // Event listener for clearing all comments (with password protection)
            document.getElementById("btn-clear").addEventListener("click", function () {
                // Ask for password before clearing all comments
                const userPassword = prompt("შეიყვანეთ პაროლი ყველა კომენტარის გასასუფთავებლად:");
    
                if (userPassword === adminPassword) {
                    // Clear the localStorage
                    localStorage.removeItem("comments");
    
                    // Clear the comment container on the page
                    commentContainer.innerHTML = "";
                    alert("ყველა კომენტარი გასუფთავებულია!");
                } else {
                    alert("არასწორი პაროლი! თქვენ არ ხართ უფლებამოსილი, გაასუფთავოთ კომენტარები.");
                }
            });
        });
    </script>
</head>
